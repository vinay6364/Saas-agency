events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        # Render doesn't care about server_name, it handles external routing
        server_name _;

        # ======== CORS Headers ========
        # Since your frontend is on Vercel, we MUST explicitly tell browsers 
        # it is safe to interact with this Render API.
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, apikey, Content-Type, Accept, x-client-info, x-supabase-api-version, Prefer' always;

        # 1. Supabase Database Proxy (Render to Supabase)
        location /api/db/ {
            # Handle Preflight OPTIONS request for browsers
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE';
                add_header 'Access-Control-Allow-Headers' 'Authorization, apikey, Content-Type, Accept, x-client-info, x-supabase-api-version, Prefer';
                add_header 'Content-Type' 'text/plain charset=UTF-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            rewrite ^/api/db/(.*) /$1 break;
            proxy_pass https://tfeobcjbbzvqivsgepak.supabase.co;
            proxy_ssl_server_name on;
            proxy_set_header Host tfeobcjbbzvqivsgepak.supabase.co;
            proxy_pass_request_headers on;
        }

        # 2. Future Microservices proxies (Render Private Services)
        location /api/chatbot/ {
            # When you deploy the chatbot on Render, you'll change this to the 
            # internal private service URL Render gives you (e.g. proxy_pass http://chatbot-service:5000/)
            return 501 "Chatbot microservice not yet deployed on Render";
        }
        
        location /api/voice/ {
            return 501 "Voice microservice not yet deployed on Render";
        }

        # Catch-all
        location / {
            return 200 "Agency API Gateway is Live!";
        }
    }
}
